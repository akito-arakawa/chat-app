databaseChangeLog:
  - changeSet:
      id: 3
      author: aki
      preConditions:
        - sqlCheck:
            expectedResult: 1
            sql: "SELECT 1 FROM pg_available_extensions WHERE name = 'uuid-ossp'"
      changes:
        - createTable:
            tableName: chat_room_members
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: "uuid_generate_v4()"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: room_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: joined_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: chat_room_members
            baseColumnNames: room_id
            referencedTableName: chat_rooms
            referencedColumnNames: id
            constraintName: fk_chat_room_members_room_id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: chat_room_members
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_chat_room_members_user_id
          