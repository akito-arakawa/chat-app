databaseChangeLog:
  - changeSet:
      id: 2
      author: aki
      preConditions:
        - sqlCheck:
            expectedResult: 1
            sql: "SELECT 1 FROM pg_available_extensions WHERE name = 'uuid-ossp'"
      changes:
        - createTable:
            tableName: friend_requests
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: "uuid_generate_v4()"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: from_user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: to_user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: requested_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: responded_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: friend_requests
            baseColumnNames: from_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_friend_requests_from_user

        - addForeignKeyConstraint:
            baseTableName: friend_requests
            baseColumnNames: to_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_friend_requests_to_user
